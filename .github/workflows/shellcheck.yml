name: Shell CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Syntax check
        run: find . -type f -name "*.sh" -exec bash -n {} \;

      - name: ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck -s bash {} \;